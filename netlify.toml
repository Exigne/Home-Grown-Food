# ─── NETLIFY CACHE CONTROL ────────────────────────────────────────────────────
# HTML — never cache, always fetch fresh so deploys show immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Root — same, catches requests to /
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# JS & CSS — cache for 1 year but ONLY by filename version (?v=N)
# When you bump ?v=N in index.html the browser fetches the new file
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 1 year
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
