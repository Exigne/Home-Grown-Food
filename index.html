<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Grown — Food That Makes You Feel Good</title>
<link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
<link href="[https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800&display=swap)" rel="stylesheet">
<script src="[https://js.stripe.com/v3/](https://js.stripe.com/v3/)"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP NAV -->
<nav class="topbar">
  <a class="brand" href="#" onclick="showView('shop',event)">
    <svg class="brand-logo" viewBox="0 0 42 42" fill="none" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
      <circle cx="21" cy="18" r="14" fill="rgba(107,191,74,0.15)"/>
      <ellipse cx="17" cy="12" rx="5" ry="8" transform="rotate(-20 17 12)" fill="#6BBF4A"/>
      <ellipse cx="25" cy="10" rx="3" ry="6" transform="rotate(15 25 10)" fill="#A8D97F"/>
      <ellipse cx="22" cy="22" rx="7" ry="9" transform="rotate(10 22 22)" fill="#164A2E"/>
    </svg>
    <div>
      <div class="brand-name">Home Grown</div>
      <div class="brand-tagline">Food that makes you feel good</div>
    </div>
  </a>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-shop" onclick="showView('shop',event)">Shop</button>
    <button class="nav-btn admin-tab" id="nav-admin" onclick="showView('admin',event)">Admin Panel</button>
  </div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Basket <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<!-- ══ SHOP ══ -->
<div class="view active" id="view-shop">
  <div class="shop-hero">
    <div class="hero-badge">🌿 Small Batch · Freshly Made</div>
    <h1>HOME <span>GROWN</span></h1>
    <p>Food That Makes You Feel Good</p>
  </div>
  <div class="shop-content">
    <div class="section-sub">Our Snacks <span></span></div>
    <div id="shop-loading" style="text-align:center; padding: 2rem; font-weight:800; color: var(--green-dark);">Loading fresh snacks...</div>
    <div class="products-grid" id="products-grid" style="display:none;"></div>
  </div>
</div>

<!-- ══ CART DRAWER ══ -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCartOnOverlay(event)">
  <div class="cart-drawer">
    <div class="cart-header"><h2>🧺 Your Basket</h2><button class="close-btn" onclick="toggleCart()">✕</button></div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer" id="cart-footer" style="display:none;">
      <div class="cart-total"><span>Subtotal</span><span id="cart-total-amount">£0.00</span></div>
      <button class="checkout-btn" onclick="openCheckout()">Checkout →</button>
    </div>
  </div>
</div>

<!-- ══ CHECKOUT MODAL ══ -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal">
    <div class="modal-head"><h2>Complete Your Order</h2><button class="close-btn" onclick="closeCheckout()">✕</button></div>
    <div id="checkout-content" class="modal-body">
        <div class="order-summary-box"><div id="checkout-summary"></div></div>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" id="ch-fname"></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="ch-lname"></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="ch-email"></div>
        <div class="form-group"><label>Address</label><input type="text" id="ch-address"></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" id="ch-city"></div>
          <div class="form-group"><label>Postcode</label><input type="text" id="ch-postcode"></div>
        </div>
        <div id="stripe-card-section" class="stripe-section" style="display:none; margin-top:20px;">
          <label class="stripe-label">Payment Card</label>
          <div id="card-element" style="padding:10px; border:2px solid var(--border); border-radius:10px;"></div>
          <div id="card-errors" style="color:var(--danger); font-size:0.8rem; margin-top:5px;"></div>
        </div>
        <button class="pay-btn" id="pay-btn" onclick="processPayment()" style="margin-top:2rem;" disabled>
            🌿 Place Order — <span id="pay-amount">£0.00</span>
        </button>
    </div>
    <div id="success-content" class="success-screen" style="display:none; text-align:center; padding:3rem;">
        <div class="success-icon" style="font-size:3rem;">🎉</div>
        <h2>Order Placed!</h2>
        <div class="order-num" id="success-order-num" style="font-weight:800; color:var(--green-mid);"></div>
        <button class="action-btn primary" onclick="location.reload()" style="margin-top:2rem; padding:10px 20px; background:var(--yellow); border:none; border-radius:10px; cursor:pointer;">Continue Shopping</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
